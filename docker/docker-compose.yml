version: "3.9"

services:
  ml-dev:
    build:
      context: .                      # Dockerfile is in docker/ folder
      dockerfile: Dockerfile

    image: lane-assisted-vo:latest
    container_name: lane-assisted-vo-dev

    # ── GPU passthrough ───────────────────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics

    volumes:
      - ..:/workspace                 # repo root (one level up) → /workspace
      - /tmp/.X11-unix:/tmp/.X11-unix
      - lane-vo-cache:/root/.cache

    stdin_open: true
    tty: true

    ports:
      - "8888:8888"   # JupyterLab
      - "6006:6006"   # TensorBoard

    working_dir: /workspace
    restart: unless-stopped

volumes:
  lane-vo-cache:
